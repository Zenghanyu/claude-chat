<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#212121">
  <title>Claude Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Sidebar overlay (mobile backdrop) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app">

    <!-- ── Sidebar ─────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新对话
        </button>
        <button class="icon-btn" id="settingsBtn" title="设置">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
      <div class="sessions-list" id="sessionsList"></div>
    </aside>

    <!-- ── Main Content ─────────────────────────────────────────────── -->
    <main class="main-content">

      <!-- Header -->
      <header class="chat-header">
        <button class="icon-btn menu-btn" id="menuBtn" aria-label="菜单">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="header-title" id="headerTitle">新对话</span>
        <select class="model-select" id="modelSelect" title="选择模型">
          <option value="claude-sonnet-4-6">Sonnet 4.6 ⚡</option>
          <option value="claude-opus-4-6">Opus 4.6 🧠</option>
          <option value="claude-haiku-4-5">Haiku 4.5 🚀</option>
        </select>
      </header>

      <!-- Messages area -->
      <div class="messages-container" id="messagesContainer">

        <!-- Welcome screen -->
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">
            <svg width="44" height="44" viewBox="0 0 32 32" fill="none">
              <rect width="32" height="32" rx="10" fill="#7c3aed"/>
              <path d="M8 16C8 11.582 11.582 8 16 8s8 3.582 8 8-3.582 8-8 8-8-3.582-8-8z" fill="rgba(255,255,255,0.15)"/>
              <path d="M12 16c0-2.21 1.79-4 4-4s4 1.79 4 4-1.79 4-4 4-4-1.79-4-4z" fill="white"/>
            </svg>
          </div>
          <h1>Claude Chat</h1>
          <p>您的专属 AI 助手，随时为您解答问题</p>
          <div class="suggestions">
            <button class="suggestion-chip" onclick="sendSuggestion('用 Python 写一个快速排序算法')">用 Python 写一个快速排序算法</button>
            <button class="suggestion-chip" onclick="sendSuggestion('帮我写一封正式的商务邮件')">帮我写一封商务邮件</button>
            <button class="suggestion-chip" onclick="sendSuggestion('解释一下量子计算的基本原理')">解释量子计算原理</button>
            <button class="suggestion-chip" onclick="sendSuggestion('推荐几本值得一读的书籍')">推荐几本好书</button>
          </div>
        </div>

        <!-- Messages list -->
        <div class="messages-list" id="messagesList"></div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="messageInput"
            placeholder="给 Claude 发送消息… （Enter 发送，Shift+Enter 换行）"
            rows="1"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          ></textarea>
          <button class="send-btn" id="sendBtn" title="发送">
            <svg id="sendIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <p class="input-hint">Claude 可能会犯错，重要信息请自行核实</p>
      </div>
    </main>
  </div><!-- /app -->

  <!-- ── Settings Modal ────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2>设置</h2>
        <button class="modal-close" id="modalClose" aria-label="关闭">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="apiKeyInput">API Key</label>
          <div class="input-with-toggle">
            <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-…" autocomplete="off">
            <button class="toggle-visibility" id="toggleVisibility" type="button" title="显示/隐藏">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <small>在 <a href="https://api.aicodemirror.com/api/claudecode" target="_blank" rel="noopener">Anthropic Console</a> 获取 Key。仅存储在您的浏览器本地，不会上传服务器。</small>
        </div>
        <div class="form-group">
          <label for="systemPromptInput">系统提示词 <span class="optional">（可选）</span></label>
          <textarea id="systemPromptInput" placeholder="例如：请用简洁的中文回答，并在回答末尾总结要点。" rows="3"></textarea>
          <small>每次对话开始时发送给 Claude 的指令。</small>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancelSettings">取消</button>
        <button class="btn btn-primary" id="saveSettingsBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
  <script src="js/app.js"></script>
  <!-- Pure static version: calls Claude API directly, no backend needed -->

</body>
</html>
